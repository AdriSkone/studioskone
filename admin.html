<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon_skone.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Studio Skøne</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #FBF4E4;
      --surface:     #E8D1B3;
      --card:        #FFF8EF;
      --accent:      #C4603B;
      --accent-dark: #A84E2E;
      --dark:        #1A1A1A;
      --text:        #1A1A1A;
      --muted:       #6B6B6B;
      --border:      #E2D8CB;
      --font:        'Barlow', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }

    .login-logo { display: block; height: 26px; margin-bottom: 32px; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: var(--font);
      font-size: 16px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }
    .login-input:focus { border-color: var(--accent); }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .login-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }

    .login-error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .dash-header {
      background: var(--dark);
      padding: 0 40px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .dash-logo { height: 20px; filter: brightness(10); }

    .dash-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .dash-site { color: rgba(255,255,255,0.4); font-size: 13px; }

    .dash-logout {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      background: none;
      border: none;
      font-family: var(--font);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .dash-logout:hover { background: rgba(255,255,255,0.1); color: white; }

    .dash-content {
      flex: 1;
      padding: 40px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Config warning ── */
    .config-warning {
      background: #fff8e1;
      border: 1px solid #ffd54f;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      margin-bottom: 28px;
      display: none;
    }
    .config-warning code {
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Top bar ── */
    .dash-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }
    .dash-page-title { font-size: 20px; font-weight: 700; }

    .range-buttons { display: flex; gap: 8px; }
    .range-btn {
      padding: 7px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: var(--font);
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .range-btn:hover, .range-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(196,96,59,0.06);
    }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value { font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .stat-delta { font-size: 12px; color: var(--muted); }
    .stat-delta.up   { color: #27ae60; }
    .stat-delta.down { color: #c0392b; }

    /* ── Chart ── */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Bottom grid ── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .list-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      gap: 12px;
    }
    .metric-row:last-child { border-bottom: none; }

    .metric-url {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      color: var(--text);
    }
    .metric-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .metric-bar-bg {
      width: 72px;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .metric-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
    }
    .metric-count { font-size: 13px; color: var(--muted); min-width: 28px; text-align: right; }

    /* ── Devices ── */
    .devices-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 40px;
    }
    .devices-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .device-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .device-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }

    /* ── States ── */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 14px;
    }
    .loading.error { color: #c0392b; }
    .loading small { display: block; margin-top: 8px; color: var(--muted); font-size: 12px; }

    .empty-state { color: var(--muted); font-size: 14px; padding: 16px 0; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .bottom-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .dash-content { padding: 20px 16px; }
      .dash-header  { padding: 0 16px; }
      .stats-grid   { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-value   { font-size: 24px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <img src="/logo_skone_sansh2.svg" alt="Studio Skøne" class="login-logo">
      <h1 class="login-title">Analytics</h1>
      <p class="login-sub">Accès réservé</p>
      <input
        type="password"
        id="pwd-input"
        class="login-input"
        placeholder="Mot de passe"
        autocomplete="current-password"
      >
      <button id="pwd-btn" class="login-btn">Accéder →</button>
      <p id="pwd-error" class="login-error">Mot de passe incorrect.</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header class="dash-header">
      <img src="/logo_skone_sansh2.svg" alt="Studio Skøne" class="dash-logo">
      <div class="dash-header-right">
        <span class="dash-site">studioskone.com</span>
        <button id="logout-btn" class="dash-logout">Déconnexion</button>
      </div>
    </header>

    <main class="dash-content">
      <div id="config-warning" class="config-warning">
        ⚠️ Variables d'environnement manquantes. Renseignez
        <code>VITE_UMAMI_WEBSITE_ID</code> et <code>VITE_UMAMI_API_TOKEN</code>
        dans <code>.env.local</code> puis relancez le serveur.
      </div>

      <div class="dash-top">
        <h1 class="dash-page-title">Vue d'ensemble</h1>
        <div class="range-buttons">
          <button class="range-btn active" data-range="7d">7 jours</button>
          <button class="range-btn" data-range="30d">30 jours</button>
          <button class="range-btn" data-range="90d">90 jours</button>
        </div>
      </div>

      <div id="dash-body">
        <div class="loading">Chargement…</div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/admin.ts"></script>
</body>
</html>
